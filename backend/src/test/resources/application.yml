spring:
  datasource:
    url: jdbc:tc:postgresql:16:///securescope
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

securescope:
  detection:
    brute-force:
      threshold: 5
      window-seconds: 60
    port-scan:
      threshold: 10
      window-seconds: 10
    allowed-hours:
      start: 9
      end: 18
